# Serialist — Cloudflare Pages config
# Author: SushiPL-coder | MIT License
#
# NOTE: This project deploys as a *Cloudflare Pages* project (git integration
# or drag-and-drop). Pages reads bindings from the DASHBOARD, not from this
# file — it is kept as documentation of what must be configured.
#
# ── Required bindings (Pages → Settings → Functions / Bindings) ──────
#   D1 database:  binding name = DB   →  database "serialist-db"
#                 (create DB, then run schema.sql in its Console)
#
# ── Required variables (Pages → Settings → Variables and secrets) ────
#   VAPID_PUBLIC_KEY   (Plaintext) — base64url, generated as a PAIR with the private key
#   VAPID_PRIVATE_KEY  (Secret)    — base64url raw key (43 chars, from `npx web-push generate-vapid-keys`)
#   VAPID_SUBJECT      (Secret)    — e.g. mailto:you@example.com
#   CRON_SECRET        (Secret)    — random string protecting /api/push-send
#   AUTH_SECRET        (Secret)    — long random string used to sign login tokens
#   AUTH_USERS         (Secret)    — accounts, format: user1:pass1;user2:pass2
#   TMDB_API_KEY       (Secret)    — optional; TMDB Read Access Token for server-side search
#
# ── Push notification cron ───────────────────────────────────────────
# Cloudflare Pages does NOT support cron triggers. Use an external cron
# (e.g. https://cron-job.org, free) calling once per hour:
#   GET https://YOUR-PROJECT.pages.dev/api/push-send?secret=YOUR_CRON_SECRET

name = "serialist"
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"
